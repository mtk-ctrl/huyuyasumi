<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111936">
  <title>冬休みラボ｜ライフクエスト</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="sky" aria-label="空島の冒険画面">
      <div class="stars" aria-hidden="true"></div>
      <div class="aurora aurora-one" aria-hidden="true"></div>
      <div class="aurora aurora-two" aria-hidden="true"></div>
      <div class="sun" aria-hidden="true"></div>

      <header class="topbar">
        <div>
          <p class="eyebrow">冬休みラボ・第1実験</p>
          <h1>ライフクエスト</h1>
        </div>
        <div class="level-chip" aria-label="現在のレベル">
          <span>LEVEL</span>
          <strong id="level">1</strong>
        </div>
      </header>

      <section class="story-card glass">
        <p class="story-kicker">空島通信</p>
        <h2 id="storyTitle">ねむり島が、君を待っている。</h2>
        <p id="storyText">今日の行動が、島のエネルギーになる。5つのクエストを達成して、空に光を取り戻そう。</p>
      </section>

      <section class="world" aria-label="成長する浮遊島">
        <div class="cloud cloud-a" aria-hidden="true"></div>
        <div class="cloud cloud-b" aria-hidden="true"></div>
        <div class="island-wrap" id="islandWrap">
          <div class="island-glow" aria-hidden="true"></div>
          <div class="island">
            <div class="grass"></div>
            <div class="home">
              <div class="roof"></div>
              <div class="house-body"><span class="window"></span><span class="door"></span></div>
            </div>
            <div class="tree tree-one"><span></span></div>
            <div class="tree tree-two"><span></span></div>
            <div class="crystal crystal-one"></div>
            <div class="crystal crystal-two"></div>
            <div class="waterfall"></div>
            <div class="island-rock"></div>
          </div>
          <div class="spirit" id="spirit" aria-label="空島の案内役モコ">
            <span class="spirit-eye left"></span>
            <span class="spirit-eye right"></span>
            <span class="spirit-mouth"></span>
          </div>
        </div>
        <div class="progress-orbit" aria-label="島のエネルギー">
          <svg viewBox="0 0 120 120" role="img" aria-label="達成率">
            <circle class="orbit-track" cx="60" cy="60" r="52"></circle>
            <circle class="orbit-value" id="orbitValue" cx="60" cy="60" r="52"></circle>
          </svg>
          <div><strong id="energy">0</strong><span>%</span></div>
        </div>
      </section>

      <section class="quest-panel glass">
        <div class="quest-heading">
          <div>
            <p class="eyebrow">TODAY'S MISSION</p>
            <h2>今日のクエスト</h2>
          </div>
          <p><strong id="doneCount">0</strong> / 5</p>
        </div>

        <div class="quest-grid" id="questGrid">
          <button class="quest" data-id="wake" data-xp="20">
            <span class="quest-icon">🌅</span><span><strong>太陽より先に起きる</strong><small>早起きして朝の力を集めよう</small></span><span class="quest-check">✓</span>
          </button>
          <button class="quest" data-id="meal" data-xp="20">
            <span class="quest-icon">🍚</span><span><strong>元気の燃料を食べる</strong><small>食事を食べて島をあたためよう</small></span><span class="quest-check">✓</span>
          </button>
          <button class="quest" data-id="study" data-xp="25">
            <span class="quest-icon">📚</span><span><strong>知識のかけらを集める</strong><small>勉強して新しい道を見つけよう</small></span><span class="quest-check">✓</span>
          </button>
          <button class="quest" data-id="exercise" data-xp="20">
            <span class="quest-icon">⚡</span><span><strong>からだの雷を呼び起こす</strong><small>運動して空島に風を起こそう</small></span><span class="quest-check">✓</span>
          </button>
          <button class="quest" data-id="help" data-xp="15">
            <span class="quest-icon">🧹</span><span><strong>家族の町を助ける</strong><small>お手伝いでやさしさの光を届けよう</small></span><span class="quest-check">✓</span>
          </button>
        </div>
      </section>

      <section class="reward glass" id="rewardCard">
        <div class="reward-icon">🥚</div>
        <div>
          <p class="eyebrow">NEXT DISCOVERY</p>
          <h2 id="rewardTitle">ふしぎなタマゴ</h2>
          <p id="rewardText">クエストを3つ達成すると、中から仲間の気配が……。</p>
        </div>
      </section>

      <footer>
        <button class="reset-button" id="resetButton">今日の記録をリセット</button>
        <p>記録はこの端末のブラウザ内だけに保存されます。</p>
      </footer>
    </section>
  </main>

  <div class="celebration" id="celebration" aria-hidden="true">
    <div class="celebration-card">
      <p>MISSION COMPLETE</p>
      <h2>ねむり島が目を覚ました！</h2>
      <span>明日は、雲の向こうに新しい島が現れるかも。</span>
      <button id="closeCelebration">冒険を続ける</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
